[qwen]
# 请填入您的 API Key（从 https://dashscope.console.aliyun.com/apiKey 获取）
apiKey =sk-2382a5bb2b744ebb83a4c873b7f377f2
model = qwen-plus
# API 端点地址（默认为阿里云 DashScope）
endpoint = https://dashscope.aliyuncs.com/compatible-mode/v1
maxRetries = 3
maxChunkLength = 8000
requestTimeout = 300000

[database]
host = localhost
port = 3306
database = qingning_comic
username = qingning
password = 123456

[qwenImage]
# 通义万相图像生成配置（使用与 qwen 相同的 API Key）
# 图像生成模型：wanx2.1-t2i-turbo（快速版，性价比高）
generateModel = wanx2.1-t2i-turbo
# 图像编辑模型
editModel = qwen-image-edit
# 请求超时（毫秒）
requestTimeout = 120000
# 最大重试次数
maxRetries = 3
# 强制使用占位图（调试用）
forceMock = false

[storage]
# 存储类型: local 或 s3
type = local

# 本地存储配置（type=local 时使用）
dataDir = data

[imagen]
# Google Gemini Images API 配置
# 请填入您的 API Key（从 https://aistudio.google.com/apiKey 获取）
apiKey = your-gemini-api-key-here
# API 端点地址
baseUrl = https://generativelanguage.googleapis.com
# 模型名称
model = generateModel
# 请求超时时间（毫秒）
requestTimeout = 120000
# 最大重试次数
maxRetries = 3
# 强制使用占位图（开发测试时可用）
forceMock = false
