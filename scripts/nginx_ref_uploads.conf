# 参考图上传服务 Nginx 配置
# 在宝塔面板 -> 网站 -> 你的站点 -> 配置文件 中，把以下内容加入 server {} 块内

    # 静态文件访问：外部（即梦AI）通过此路径拉取参考图
    location /ref_uploads/ {
        alias /data/comic/ref_uploads/;
        expires 1h;
        add_header Cache-Control "public";
        # 只允许 GET，禁止目录浏览
        autoindex off;
        limit_except GET {
            deny all;
        }
    }

    # 上传接口：反向代理到本地 Python 服务
    location /upload {
        proxy_pass http://127.0.0.1:18765/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 15m;
        proxy_read_timeout 60s;
    }

    # 健康检查（可选）
    location /upload/health {
        proxy_pass http://127.0.0.1:18765/health;
    }
